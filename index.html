<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>To-Do List Dashboard</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search tasks...">
                </div>
                <div class="header-actions">
                    <button class="icon-btn">
                        <span class="notification-dot"></span>
                        <i class="fas fa-bell"></i>
                    </button>
                    <button class="add-btn" onclick="openModal()">
                        <i class="fas fa-plus"></i> Add New Task
                    </button>
                </div>
            </header>

            <section class="welcome-section">
                <div class="greeting" id="greeting">Good Morning</div>
                <h1>You've got <span class="task-count" id="taskCount">0</span> pending tasks</h1>
            </section>

            <div class="tasks-wrapper">
                <div class="task-section">
                    <div class="section-header">
                        <h2><i class="fas fa-clock text-warning"></i> On Hold / Active</h2>
                    </div>
                    <div id="onHoldTasks" class="tasks-container"></div>
                </div>

                <div class="task-section">
                    <div class="section-header">
                        <h2><i class="fas fa-check-circle text-success"></i> Completed</h2>
                    </div>
                    <div id="completedTasks" class="tasks-container"></div>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="profile-card">
                <div class="profile-avatar">Tasks</div>
                <div class="profile-info">
                    <h3>TO-DO TASKS LIST</h3>
                    
                </div>
            </div>

            <hr class="divider">

            <div class="sidebar-section">
                <h3 class="sidebar-title">Results Summary</h3>
                
                <div class="stat-card">
                    <div class="stat-header">
                        <span class="stat-label">Completion Rate</span>
                        <span class="stat-value" id="completionRateValue">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="completionProgress" style="width: 0%"></div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-mini-card">
                        <span class="mini-label">Total Tasks</span>
                        <span class="mini-value" id="totalTasks">0</span>
                    </div>
                    <div class="stat-mini-card">
                        <span class="mini-label">Completed</span>
                        <span class="mini-value text-success" id="completedCount">0</span>
                    </div>
                    <div class="stat-mini-card">
                        <span class="mini-label">Pending</span>
                        <span class="mini-value text-warning" id="pendingCount">0</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h2 class="modal-header">Add / Update Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" required />
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskStatus">Status</label>
                        <select id="taskStatus">
                            <option value="pending">Pending</option>
                            <option value="progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="minor">Minor</option>
                            <option value="normal">Normal</option>
                            <option value="critical">Critical</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="taskDeadline">Deadline Date & Time</label>
                    <input type="datetime-local" id="taskDeadline" required />
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
